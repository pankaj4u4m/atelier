name: Feature request
description: Suggest an idea or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Early design feedback is especially welcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like Atelier to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MCP / host integrations
        - ReasonBlocks / reasoning reuse
        - Failure rescue
        - Evals / benchmarks
        - Storage / retrieval
        - CLI / SDK
        - Docs / examples
        - Other
    validations:
      required: false
