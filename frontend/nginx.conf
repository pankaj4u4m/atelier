server {
    listen 3125;
    listen [::]:3125;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to service container
    location /api/ {
        # Use Docker's internal DNS resolver
        resolver 127.0.0.11 valid=30s;
        set $upstream service;

        # Remove trailing slash to pass the URI correctly
        proxy_pass http://$upstream:8787;

        # Rewrite /api/foo to /foo
        rewrite ^/api/(.*) /$1 break;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
