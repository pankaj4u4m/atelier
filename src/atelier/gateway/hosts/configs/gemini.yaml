host_id: gemini
name: Gemini CLI
version: 1.0.0
description: Integration with Google Gemini CLI for multi-modal code analysis and generation
platforms:
  - macos
  - linux
  - windows

detection:
  command: gcloud ai config list
  config_path: ~/.gemini/settings.json
  env_var: GOOGLE_API_KEY

recommended_packs:
  - atelier-pack-gemini-integration
  - atelier-pack-multimodal-analysis
  - atelier-pack-google-apis

mcp:
  servers:
    - name: atelier
      command: atelier
      args: ["mcp", "--host", "gemini"]
      env:
        ATELIER_ROOT: "~/.atelier"

installation:
  macos: |
    # Install Google Cloud SDK
    brew install google-cloud-sdk
    
    # Install Atelier
    brew install atelier
    
    # Authenticate with Google Cloud
    gcloud auth application-default login
    
    # Setup Gemini integration
    atelier host setup gemini
    
    # Configure Gemini API
    atelier host configure gemini --api-key $GOOGLE_API_KEY
    
    # Verify installation
    atelier host info gemini

  linux: |
    # Install Google Cloud SDK
    curl https://sdk.cloud.google.com | bash
    exec -l $SHELL
    gcloud init
    
    # Install Atelier
    sudo apt-get install atelier  # or your distro's package manager
    
    # Authenticate with Google Cloud
    gcloud auth application-default login
    
    # Setup Gemini integration
    atelier host setup gemini
    
    # Configure Gemini API
    atelier host configure gemini --api-key $GOOGLE_API_KEY
    
    # Verify installation
    atelier host info gemini

  windows: |
    # Install Google Cloud SDK
    choco install google-cloud-sdk
    
    # Install Atelier
    choco install atelier
    
    # Authenticate with Google Cloud
    gcloud auth application-default login
    
    # Setup Gemini integration
    atelier host setup gemini
    
    # Configure Gemini API
    atelier host configure gemini --api-key %GOOGLE_API_KEY%
    
    # Verify installation
    atelier host info gemini

prompt_templates:
  - name: pack-context
    template: |
      Atelier pack in use: {pack.name}
      Domain: {pack.domain}
      
      Reasoning patterns ({pack.reasonblocks_count}):
      {pack.reasonblocks}
      
      Quality rubrics ({pack.rubrics_count}):
      {pack.rubrics}
      
      These enhance Gemini's code analysis with structured reasoning.
      
  - name: multimodal-analysis
    template: |
      Analyze code/image using pack '{pack.name}' patterns:
      
      Analysis frameworks:
      - {pack.patterns}
      
      Validation rules:
      - {pack.validation_rules}
      
      Apply these quality gates: {pack.rubrics}
      
  - name: generation-guidance
    template: |
      Generate code for {pack.domain} using pack '{pack.name}':
      
      Available patterns for generation:
      {pack.generation_patterns}
      
      Quality assurance checks:
      {pack.qa_rubrics}
