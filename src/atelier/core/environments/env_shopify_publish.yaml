id: env_shopify_publish
domain: shopify.publish
description: >
  The operating law for any agent action that writes to a live merchant
  Shopify store: publishing a product, updating a metafield, changing a
  handle, or republishing a variant. Beseam treats live-store writes as
  high-risk by default — every write must use a stable product GID, must
  be preceded by a snapshot, must be followed by a refetch + audit, and
  must be rollback-able.

triggers:
  - shopify
  - publish
  - product update
  - metafield
  - product handle
  - storefront

forbidden:
  - parse_product_handle_from_url
  - guess product id from handle
  - assume handle is stable
  - skip pre-publish snapshot
  - skip post-publish refetch
  - publish without rollback plan

required:
  - product_identity_uses_gid
  - pre_publish_snapshot_exists
  - write_result_checked
  - post_publish_refetch_done
  - post_publish_audit_passed
  - rollback_available

escalate:
  - product_identity_ambiguous
  - rollback_snapshot_missing
  - merchant_visible_drift_detected
  - rollback_failed
  - merchant_live_store_write_without_verification

high_risk_tools:
  - shopify.publish
  - shopify.update_metafield
  - shopify.product.update

rubric_id: rubric_shopify_publish

related_blocks:
  - 01-shopify-product-identity
  - 03-post-publish-verification
  - 08-rollback-required-after-failed-publish
