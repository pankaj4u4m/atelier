id: env_pdp_schema
domain: pdp.schema
description: >
  Operating law for generating or modifying product detail page schema
  (JSON-LD). Schema is what AI assistants and search engines read; a
  broken schema silently kills referral traffic.

triggers:
  - pdp schema
  - json-ld
  - product schema
  - schema.org
  - structured data

forbidden:
  - hand-edit json-ld
  - copy schema from another product without refetch
  - skip schema validation
  - publish schema without availability check

required:
  - schema_validation_passed
  - availability_state_correct
  - price_field_matches_storefront
  - generated_copy_diffed_against_source

escalate:
  - schema_validation_failed_in_production
  - availability_drift_detected

high_risk_tools:
  - schema.validate
  - pdp.publish

rubric_id: rubric_pdp_schema

related_blocks:
  - 02-jsonld-availability
  - 07-generated-pdp-copy-must-diff-source
