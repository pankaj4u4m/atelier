id: env_catalog_fix
domain: catalog
description: >
  Operating law for any agent action that mutates the merchant catalog —
  enriching attributes, normalizing variants, fixing taxonomy. Catalog
  truth is upstream of every storefront, so a wrong write cascades.

triggers:
  - catalog fix
  - enrich product
  - normalize variant
  - taxonomy
  - attribute fill

forbidden:
  - overwrite merchant-supplied attribute without flagging
  - drop variant without explicit confirmation
  - bulk write without dry-run preview
  - infer brand from product title alone

required:
  - source_of_truth_identified
  - dry_run_diff_reviewed
  - merchant_supplied_fields_preserved
  - rollback_available

escalate:
  - merchant_supplied_field_overwritten
  - variant_count_dropped
  - brand_classification_low_confidence

high_risk_tools:
  - catalog.write
  - catalog.bulk_update

rubric_id: rubric_catalog_fix

related_blocks:
  - 06-catalog-truth-source-of-truth
