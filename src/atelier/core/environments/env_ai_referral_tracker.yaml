id: env_ai_referral_tracker
domain: tracker
description: >
  Operating law for the Beseam tracker — classification of inbound
  traffic as AI-referral vs organic vs other. Tracker outputs feed
  merchant analytics and pricing, so misclassification leaks revenue.

triggers:
  - tracker
  - ai referral
  - classify referral
  - traffic classification
  - inbound source

forbidden:
  - classify without referrer evidence
  - classify chatgpt referrer as organic
  - classify a known bot as ai-referral
  - silently downgrade confidence below threshold

required:
  - referrer_evidence_recorded
  - classifier_version_pinned
  - confidence_above_threshold
  - bot_filter_applied

escalate:
  - confidence_below_threshold
  - classifier_disagreement_with_baseline
  - referrer_evidence_missing

high_risk_tools:
  - tracker.classify
  - tracker.bulk_reclassify

rubric_id: rubric_ai_referral

related_blocks:
  - 05-ai-referral-evidence
  - 10-tracker-evidence-required
