id: env_audit_service
domain: audit
description: >
  Operating law for the Beseam PDP audit service — running, recording,
  and acting on a PDP audit. Audits are the canonical record of
  storefront truth at a point in time.

triggers:
  - pdp audit
  - audit task
  - audit playbook
  - audit_metadata
  - run audit

forbidden:
  - mutate audit history
  - re-run audit without recording previous result
  - publish based on stale audit
  - skip audit on high-risk publish

required:
  - audit_run_recorded
  - audit_metadata_path_valid
  - audit_result_referenced_by_action

escalate:
  - audit_failed_repeatedly
  - audit_metadata_missing
  - publish_proceeded_with_failing_audit

high_risk_tools:
  - audit.publish_result
  - audit.bulk_run

rubric_id: rubric_pdp_schema

related_blocks:
  - 04-audit-discipline
  - 03-post-publish-verification
