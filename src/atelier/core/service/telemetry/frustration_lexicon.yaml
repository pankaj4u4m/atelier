# Reviewed, in-repo, transparent. Categories tuned for Atelier.
# Do NOT port leaked Claude Code prompt content.
categories:
  explicit_negative:
    - "this is broken"
    - "doesn't work"
    - "does not work"
    - "not working"
    - "completely broken"
    - "useless"
    - "garbage"
    - "this failed"
    - "it failed again"
    - "nothing changed"
    - "still broken"
    - "worse than before"
  command_repeat_marker:
    - "again"
    - "still"
    - "yet again"
    - "same error"
    - "same failure"
    - "keeps failing"
    - "retrying"
    - "looping"
  dissatisfaction:
    - "not what i asked"
    - "you keep"
    - "stop doing"
    - "why did you"
    - "that's wrong"
    - "that is wrong"
    - "you missed"
    - "you ignored"
    - "this isn't right"
    - "this is not right"
    - "not acceptable"
    - "i don't want"
  correction:
    - "no, i said"
    - "no i said"
    - "i told you"
    - "i already said"
    - "read the request"
    - "pay attention"
    - "that's not the file"
    - "that is not the file"
    - "wrong file"
    - "wrong command"
    - "wrong approach"
    - "start over"
