- id: rb-swe-general-plan-quality
  title: Plan Quality Gate
  domain: swe.general
  triggers:
    - plan
    - task breakdown
    - implementation
  situation: >
    Before beginning any code generation, debugging, or refactoring task that
    requires a multi-step plan.
  dead_ends:
    - Jumping into implementation without validating the plan against requirements
    - Skipping edge case analysis in favour of the happy path
  procedure:
    - State the goal in one sentence
    - List acceptance criteria before writing any code
    - Identify the smallest testable increment
    - Surface any ambiguity and resolve it before proceeding

- id: rb-swe-general-failure-recovery
  title: Failure Recovery
  domain: swe.general
  triggers:
    - error
    - failure
    - retry
    - debug
  situation: >
    When a task fails or produces unexpected output and a recovery path must
    be determined.
  dead_ends:
    - Retrying the same action without understanding the root cause
    - Silently swallowing errors and moving on
  procedure:
    - Capture the full error message and context
    - Identify whether the failure is transient, configuration, or logic
    - Apply the smallest targeted fix first
    - Verify the fix with the original failing scenario before moving on
