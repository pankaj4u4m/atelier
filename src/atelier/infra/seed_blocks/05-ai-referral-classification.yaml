id: ai-referral-classification
title: AI Referral Classification
domain: beseam.tracker.classification
task_types: [tracker_classification, traffic_attribution]
triggers:
  - ai referral
  - referrer
  - utm
  - classify
  - traffic source
  - tracker
file_patterns:
  - "**/tracker/**"
  - "**/classifier/**"
tool_patterns:
  - tracker.classify

situation: >
  Classifying inbound traffic as AI referral vs organic vs direct. Referrer
  domains are unreliable: many AI surfaces strip referrer or route through
  proxies, and organic search engines have begun adding AI summaries.

dead_ends:
  - Classifying solely by exact referrer domain
  - Trusting referrer when missing
  - Treating UTM as authoritative without validating its shape
  - Re-running the same test twice expecting a different result

procedure:
  - "Collect evidence: referrer, UTM params, user agent, landing params"
  - Normalize each evidence channel before comparison
  - Apply combined classifier; weight evidence channels
  - Fall back to "ambiguous" rather than guessing
  - Add a fixture for missing referrer with AI-looking UTM
  - Persist evidence alongside the final classification

verification:
  - Fixture set passes (including ambiguous cases)
  - Confusion matrix unchanged or improved on regression set

failure_signals:
  - expected ai_referral got organic_search
  - expected ai_referral got direct
  - classifier oscillates between runs

when_not_to_apply: >
  Bot/crawler classification — that is a separate procedure with different
  evidence channels.
