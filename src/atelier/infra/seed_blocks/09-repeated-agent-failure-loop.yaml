id: repeated-agent-failure-loop
title: Repeated Agent Failure Loop
domain: coding
task_types: [debugging, test_fixing]
triggers:
  - test failed
  - same error
  - retry
  - loop
  - stuck
file_patterns:
  - "**"
tool_patterns:
  - bash
  - run_tests

situation: >
  An agent has tried the same command or the same fix twice and seen the
  same failure. Continuing to retry is wasted budget and risks correlated
  damage.

dead_ends:
  - Running the failing command a third time without changes
  - Re-applying the same patch with cosmetic edits
  - Adding more print statements instead of forming a hypothesis
  - Increasing parallelism to "shake out" the failure

procedure:
  - Stop. Do not run the failing command again.
  - Summarize the invariant being fought, in one sentence
  - List the assumptions that were tested and the assumptions that were not
  - Search ReasonBlocks for the failure signature
  - If no match, open the smallest reproducer and inspect it
  - Form one new hypothesis before any further command

verification:
  - A new hypothesis is written down
  - The next command tests that hypothesis specifically

failure_signals:
  - same error signature 2+ times
  - same tool called 3+ times with same args
  - growing, not shrinking, error context

when_not_to_apply: >
  Flaky infrastructure where a clean retry is the documented procedure
  (e.g. transient network errors with bounded backoff).
