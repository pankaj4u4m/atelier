id: audit-service-change-discipline
title: Audit Service Change Discipline
domain: coding
task_types: [audit_service_change]
triggers:
  - audit
  - audit service
  - audit rules
  - audit thresholds
  - audit weights
file_patterns:
  - "**/audit/**"
  - "**/scoring/**"
tool_patterns:
  - audit.run
  - audit.score

situation: >
  Modifying any audit, scoring, or quality-gate logic. Audit results are used
  to gate publishes, billing, and merchant-visible classifications.

dead_ends:
  - Tweaking thresholds without versioning
  - Changing audit weights without before/after measurement
  - Removing a check because it is "too noisy"
  - Inlining audit logic into a publish flow
  - Skipping fixture regeneration after rule changes

procedure:
  - Pin the current audit version
  - Capture a before-snapshot of audit results on the regression set
  - Apply the rule/weight/threshold change behind a versioned switch
  - Re-run audits on the regression set
  - Diff before/after; require human review for any merchant-visible flip
  - Bump the audit version on merge

verification:
  - Regression set diff reviewed
  - Audit version bumped
  - No silent merchant-visible classification flips
  - Fixtures regenerated and committed

failure_signals:
  - audit results changed without version bump
  - regression set was not run
  - merchant complaint about classification flip

when_not_to_apply: >
  Read-only refactors that do not change rule logic or output.
