id: product-jsonld-availability-source
title: Product JSON-LD Availability Source
domain: beseam.pdp.schema
task_types: [pdp_schema_fix, jsonld_validation]
triggers:
  - JSON-LD
  - schema.org
  - availability
  - InStock
  - OutOfStock
  - offers
file_patterns:
  - "**/pdp/**"
  - "**/schema/**"
tool_patterns:
  - schema.validate
  - shopify.product.read

situation: >
  Generating or fixing schema.org Product availability for Shopify products.
  PDP copy and theme-rendered JSON-LD are downstream artifacts and may be wrong.

dead_ends:
  - Inferring availability from PDP text
  - Trusting existing theme JSON-LD as source of truth
  - Treating generated marketing copy as inventory state
  - Hardcoding InStock for all variants

procedure:
  - Read variant inventory state from Shopify (per-variant)
  - Map inventory state to schema.org Availability values
  - Generate offers from variant-level data, one offer per variant
  - Honor "continue selling when out of stock" merchant settings
  - Re-validate the generated JSON-LD with a schema validator
  - Verify after publish

verification:
  - Mixed-variant inventory test passes
  - All-out-of-stock test passes
  - Continue-selling test passes
  - Schema validator returns no errors

failure_signals:
  - availability expected InStock got OutOfStock
  - schema.org validator error
  - offers array empty
  - mismatch between variant state and JSON-LD

when_not_to_apply: >
  Catalog-only changes that never reach a PDP. Wholesale-only product types
  without storefront exposure.
