id: rollback-required-after-failed-publish
title: Rollback Required After Failed Publish Verification
domain: beseam.shopify.publish
task_types: [shopify_publish, rollback]
triggers:
  - rollback
  - failed publish
  - verification failed
  - post-publish
  - revert
file_patterns:
  - "**/publish/**"
  - "**/rollback/**"
tool_patterns:
  - shopify.product.update
  - shopify.rollback

situation: >
  A Shopify publish completed the write but the post-publish verification
  failed. Leaving the half-applied state in production is not acceptable.

dead_ends:
  - Marking the task as partial and moving on
  - Retrying the same publish without changes
  - Editing the live PDP manually
  - Skipping the rollback because "the merchant did not notice yet"

procedure:
  - Halt further writes for this product
  - Load the pre-publish snapshot captured during the publish step
  - Apply the snapshot back via GID
  - Re-run the post-publish audit on the rolled-back state
  - Open an incident with the original failure context attached

verification:
  - Rollback succeeded; product matches snapshot
  - Audit passes on rolled-back state
  - Incident opened with full context

failure_signals:
  - rollback failed
  - snapshot missing
  - product still in drifted state

when_not_to_apply: >
  Reads, dry-runs, and tasks that did not write to Shopify.
