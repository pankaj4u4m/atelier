id: post-publish-verification
title: Post-Publish Verification
domain: beseam.shopify.publish
task_types: [shopify_publish, post_publish_audit]
triggers:
  - publish
  - post-publish
  - audit
  - verify
  - rollback
file_patterns:
  - "**/publish/**"
  - "**/audit/**"
tool_patterns:
  - shopify.product.update
  - shopify.publish
  - audit.run

situation: >
  Any Shopify write must be verified end-to-end. A successful HTTP write does
  not mean the merchant-visible PDP reflects the intended state.

dead_ends:
  - Treating Shopify write success as merchant-visible correctness
  - Skipping post-publish audit on small changes
  - Trusting Shopify response payload over a refetch
  - Running validation only against staged changes, not live PDP

procedure:
  - Snapshot current product state by GID before the write
  - Apply the change via GID
  - Re-fetch the product by GID
  - Diff observed state vs intended state
  - Run the post-publish audit
  - Only mark task complete if audit passes
  - If audit fails, trigger the rollback procedure

verification:
  - Re-fetch matches intended state
  - Post-publish audit passes
  - PDP renders updated values

failure_signals:
  - publish succeeded but verification failed
  - audit reports drift
  - PDP shows stale value

when_not_to_apply: >
  Read-only / observational tasks that do not write to Shopify.
