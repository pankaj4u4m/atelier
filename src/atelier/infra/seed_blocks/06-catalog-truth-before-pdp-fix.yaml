id: catalog-truth-before-pdp-fix
title: Catalog Truth Before PDP Fix
domain: beseam.catalog.fix
task_types: [pdp_fix, catalog_fix]
triggers:
  - PDP fix
  - catalog
  - source of truth
  - merchant data
  - publish fix
file_patterns:
  - "**/pdp/**"
  - "**/catalog/**"
tool_patterns:
  - catalog.read
  - catalog.write

situation: >
  Fixing a PDP issue (price, availability, copy, schema). The PDP is
  downstream; the catalog ingest record is the source of truth.

dead_ends:
  - Patching a PDP value without updating the catalog record
  - Reading the live PDP to determine the intended state
  - Letting downstream copy diverge from catalog
  - Applying the fix via theme override

procedure:
  - Identify the catalog ingest record for the affected product
  - Confirm the source-of-truth value in the ingest record
  - Update the catalog record (or fix the ingest pipeline if the record is wrong)
  - Re-publish from catalog through the normal pipeline
  - Verify PDP after publish

verification:
  - Catalog record matches intended state
  - PDP refetch matches catalog
  - Post-publish audit passes

failure_signals:
  - PDP value drifts back after next sync
  - theme override required
  - manual PDP edit needed

when_not_to_apply: >
  Theme/template-only issues that have no catalog representation.
