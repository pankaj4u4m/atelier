id: do-not-trust-generated-pdp-copy
title: Do Not Trust Generated PDP Copy as Source of Truth
domain: beseam.pdp.schema
task_types: [pdp_fix, jsonld_validation, content_fix]
triggers:
  - generated copy
  - AI copy
  - description
  - title
  - PDP text
  - source of truth
file_patterns:
  - "**/pdp/**"
  - "**/content/**"
tool_patterns:
  - schema.validate
  - llm.generate

situation: >
  When validating or fixing PDP attributes (price, availability, materials,
  dimensions). PDP body copy is often LLM-generated or merchant-edited and
  drifts from the structured catalog data.

dead_ends:
  - Extracting facts from PDP body copy
  - Using LLM-generated description as ground truth
  - Backfilling catalog from PDP scrape
  - Trusting marketing-edited copy for compliance fields

procedure:
  - Identify the structured field in the catalog (variant, metafield, attribute)
  - Use the structured field as the source of truth
  - If the structured field is missing, fix the ingest pipeline first
  - Regenerate the PDP copy from the structured field, not the other way around

verification:
  - Structured field present and authoritative
  - PDP copy regenerated from structured field
  - No new facts introduced by copy generation

failure_signals:
  - copy contradicts structured data
  - LLM hallucinated a fact in the PDP
  - merchant complains about wrong material/dimension

when_not_to_apply: >
  Pure marketing tone changes that do not touch compliance or structured fields.
