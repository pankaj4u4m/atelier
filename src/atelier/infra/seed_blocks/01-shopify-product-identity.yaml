id: shopify-product-identity
title: Shopify Product Identity
domain: beseam.shopify.publish
task_types: [shopify_publish, shopify_update, rollback]
triggers:
  - shopify publish
  - product handle
  - PDP URL
  - metafield update
  - rollback
  - product identity
file_patterns:
  - "**/shopify/**"
  - "**/publish/**"
tool_patterns:
  - shopify.update_metafield
  - shopify.product.update
  - shopify.publish

situation: >
  Identifying a Shopify product to update, publish, or roll back. Handles and
  PDP URLs are user-visible, localized, and may change at any time.

dead_ends:
  - product handle from url
  - product handle from pdp
  - parse handle from url
  - lookup product by handle
  - resolve product by url
  - use pdp url as identity
  - use storefront url to identify
  - assume product handle is stable

procedure:
  - Load Shopify Product GID from the catalog ingest record
  - Use GID for every update, publish, and rollback call
  - Treat PDP URL as observation/debug data only
  - After write, re-fetch product by GID and diff against the intended state
  - Run post-publish verification before marking the task done

verification:
  - Changed handle test passes
  - Localized URL test passes
  - Redirected PDP test passes
  - Post-publish audit passes

failure_signals:
  - wrong product updated
  - product not found
  - publish succeeded but verification failed
  - cannot resolve handle

when_not_to_apply: >
  Non-Shopify connectors that do not have stable product IDs. For those use
  the connector-specific identity rule.
