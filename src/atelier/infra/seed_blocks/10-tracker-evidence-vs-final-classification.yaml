id: tracker-evidence-vs-final-classification
title: Tracker Evidence vs Final Classification
domain: beseam.tracker.classification
task_types: [tracker_classification, debugging]
triggers:
  - tracker
  - classification
  - evidence
  - audit trail
  - explainability
file_patterns:
  - "**/tracker/**"
tool_patterns:
  - tracker.classify
  - tracker.explain

situation: >
  Reviewing or debugging tracker classifications. The final label is only
  one of two artifacts; the underlying evidence chain is what makes a
  classification defensible to a merchant.

dead_ends:
  - Storing only the final label
  - Adjusting the classifier to match anecdotal merchant feedback
  - Hiding the evidence chain behind a single confidence score
  - Reclassifying historical data without versioning the classifier

procedure:
  - Persist the raw evidence channels alongside the final label
  - Persist the classifier version that produced the label
  - When a classification is challenged, replay the evidence through the same version
  - Only retroactively re-label after a versioned classifier change

verification:
  - Evidence chain retrievable for any past classification
  - Classifier version stored
  - Re-running the stored evidence reproduces the stored label

failure_signals:
  - cannot explain why a row was classified ai_referral
  - classifier version not recorded
  - reclassification cannot be reproduced

when_not_to_apply: >
  Aggregate analytics dashboards that do not need per-row explainability.
