receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 128
  attributes/scrub:
    actions:
      - key: cwd
        action: delete
      - key: file_path
        action: delete
      - key: repo_url
        action: delete
      - key: prompt
        action: delete
      - key: code
        action: delete

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [attributes/scrub, batch]
      exporters: [debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
